name = "bcycle-map-poller"
main = "src/workers/poller.ts"
compatibility_date = "2024-09-25"
compatibility_flags = ["nodejs_compat"]

# scheduled (cron) trigger — every 4 minutes (was 2). Wider interval keeps
# the per-day KV put count under the Workers free-tier cap of 1000/day.
# 4 min × 24h = 360 ticks/day × 2 mandatory puts (latest + buffer) = 720,
# leaving ~280 puts/day for activity-log writes and manual workflows.
[triggers]
crons = ["*/4 * * * *"]

[[kv_namespaces]]
binding = "GBFS_KV"
id = "bffc291f9c02471681718c9e47ad3cff"
preview_id = "d5c3fdb806d7436c9b48019973c420ac"

[[r2_buckets]]
binding = "GBFS_R2"
bucket_name = "bcycle-map-archive"

[vars]
SYSTEMS_JSON_URL = ""  # set per environment; empty = use embedded systems.json

# Second worker: HTTP read API
# (We will deploy this as a separate Worker; for v1, one wrangler.toml = one Worker.
#  The read-api Worker gets its own config file added in Task 15.)
