name: backfill-first-seen

# One-shot: scan earliest parquet partition to find original stations,
# then backdate their first_seen_ts so only genuinely new stations show
# the "NEW" badge. Safe to re-run.
on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: backfill-first-seen
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx tsx scripts/backfill-first-seen.ts
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_API_TOKEN: ${{ secrets.CF_KV_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          SYSTEM_ID: bcycle_santabarbara
