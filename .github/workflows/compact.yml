name: parquet-compact

on:
  schedule:
    # Every 3 hours at :05. GitHub Actions schedule cron is "best effort" and
    # skips hourly runs under load. The compact script seals every finished
    # buffer in one shot, so a 3-hour cadence still backfills cleanly.
    - cron: '5 */3 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

# Opt the action runtimes (checkout, setup-node) into Node 24 to silence the
# Node 20 deprecation warning. Drop this when those actions ship v5.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: parquet-compact
  cancel-in-progress: false

jobs:
  compact:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run compaction
        run: npx tsx scripts/compact.ts
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_API_TOKEN: ${{ secrets.CF_KV_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
