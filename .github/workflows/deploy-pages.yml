name: deploy-pages

on:
  push:
    branches: [main]
    paths:
      - 'src/web/**'
      - 'src/shared/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'tailwind.config.ts'
      - 'postcss.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Determine base path
        id: base
        run: |
          if [ -f public/CNAME ]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            echo "path=/bcycle-map/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build web app
        run: npx vite build --base "${{ steps.base.outputs.path }}"
        env:
          VITE_API_BASE: https://bcycle-map-read-api.developer-95b.workers.dev

      - name: SPA fallback for client-side routing
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
